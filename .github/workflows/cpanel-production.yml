name: Deploy cPanel Production

on:
  workflow_dispatch:

concurrency:
  group: cpanel-production
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build and deploy production
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      CPANEL_APP_DIR: /repositories/yoruba-heritage-park
      CPANEL_WEBROOT_DIR: /public_html/yorubaheritageworld.com

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build cPanel output
        run: bun run build:cpanel

      - name: Install FTP client
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Validate production deployment secrets
        env:
          CPANEL_PRODUCTION_FTPS_HOST: ${{ secrets.CPANEL_FTP_HOST }}
          CPANEL_PRODUCTION_FTP_USERNAME: suwanee1155
          CPANEL_PRODUCTION_FTP_PASSWORD: ${{ secrets.CPANEL_FTP_PASSWORD }}
        run: |
          test -n "$CPANEL_PRODUCTION_FTPS_HOST"
          test -n "$CPANEL_PRODUCTION_FTP_USERNAME"
          test -n "$CPANEL_PRODUCTION_FTP_PASSWORD"

      - name: Prepare restart marker
        run: |
          date -u +"%Y-%m-%dT%H:%M:%SZ" > restart.txt
          SSR_SERVER_FILE=".output-cpanel/server/_ssr/ssr.mjs"
          if [ ! -f "$SSR_SERVER_FILE" ]; then
            SSR_SERVER_FILE="$(find .output-cpanel/server/_ssr -maxdepth 1 -name 'server-*.mjs' -type f | sort | head -n 1)"
          fi
          PUBLIC_CSS_FILE="$(find .output-cpanel/public/assets -maxdepth 1 -name '*.css' -type f | sort | head -n 1)"
          PUBLIC_JS_FILE="$(find .output-cpanel/public/assets -maxdepth 1 -name '*.js' -type f | sort | head -n 1)"
          test -n "$SSR_SERVER_FILE"
          test -n "$PUBLIC_CSS_FILE"
          test -n "$PUBLIC_JS_FILE"
          echo "SSR_SERVER_FILE=$(basename "$SSR_SERVER_FILE")" >> "$GITHUB_ENV"
          echo "TANSTACK_MANIFEST_FILE=$(basename .output-cpanel/server/_tanstack-start-manifest_v-*.mjs)" >> "$GITHUB_ENV"
          echo "PUBLIC_CSS_FILE=$(basename "$PUBLIC_CSS_FILE")" >> "$GITHUB_ENV"
          echo "PUBLIC_JS_FILE=$(basename "$PUBLIC_JS_FILE")" >> "$GITHUB_ENV"

      - name: Preflight explicit FTPS access
        env:
          CPANEL_PRODUCTION_FTPS_HOST: ${{ secrets.CPANEL_FTP_HOST }}
          CPANEL_PRODUCTION_FTP_USERNAME: suwanee1155
          CPANEL_PRODUCTION_FTP_PASSWORD: ${{ secrets.CPANEL_FTP_PASSWORD }}
        run: |
          test -n "$CPANEL_PRODUCTION_FTPS_HOST"
          test -n "$CPANEL_PRODUCTION_FTP_USERNAME"
          test -n "$CPANEL_PRODUCTION_FTP_PASSWORD"

          FTPS_URL="ftp://$CPANEL_PRODUCTION_FTPS_HOST:21"
          PREFLIGHT_MARKER=".github-ftps-preflight-test"

          cleanup_markers() {
          lftp -u "$CPANEL_PRODUCTION_FTP_USERNAME","$CPANEL_PRODUCTION_FTP_PASSWORD" "$FTPS_URL" <<EOF
          set ftp:ssl-force true
          set ftp:ssl-protect-data true
          set ftp:use-tvfs yes
          set ssl:verify-certificate yes
          set ssl:check-hostname no
          set net:max-retries 2
          set net:timeout 30
          set cmd:fail-exit no
          cd "$CPANEL_APP_DIR"
          rm -f "$PREFLIGHT_MARKER"
          cd "$CPANEL_WEBROOT_DIR"
          rm -f "$PREFLIGHT_MARKER"
          EOF
          }

          trap cleanup_markers EXIT

          lftp -u "$CPANEL_PRODUCTION_FTP_USERNAME","$CPANEL_PRODUCTION_FTP_PASSWORD" "$FTPS_URL" <<EOF
          set ftp:ssl-force true
          set ftp:ssl-protect-data true
          set ftp:use-tvfs yes
          set ssl:verify-certificate yes
          set ssl:check-hostname no
          set net:max-retries 5
          set net:timeout 60
          set cmd:fail-exit yes
          set xfer:clobber on
          echo "Explicit FTPS connection established"
          cd "$CPANEL_APP_DIR"
          echo "Production application directory accessible"
          put /dev/null -o "$PREFLIGHT_MARKER"
          rm "$PREFLIGHT_MARKER"
          echo "Write/delete preflight passed for production application directory"
          cd "$CPANEL_WEBROOT_DIR"
          echo "Production webroot accessible"
          put /dev/null -o "$PREFLIGHT_MARKER"
          rm "$PREFLIGHT_MARKER"
          echo "Write/delete preflight passed for production webroot"
          EOF

          cleanup_markers
          trap - EXIT

      - name: Upload production build to cPanel
        env:
          CPANEL_PRODUCTION_FTPS_HOST: ${{ secrets.CPANEL_FTP_HOST }}
          CPANEL_PRODUCTION_FTP_USERNAME: suwanee1155
          CPANEL_PRODUCTION_FTP_PASSWORD: ${{ secrets.CPANEL_FTP_PASSWORD }}
          SSR_SERVER_FILE: ${{ env.SSR_SERVER_FILE }}
          TANSTACK_MANIFEST_FILE: ${{ env.TANSTACK_MANIFEST_FILE }}
        run: |
          PUBLIC_DIRS="$(find .output-cpanel/public -mindepth 1 -maxdepth 1 -type d -printf '%f\n' | sort)"
          test -n "$PUBLIC_DIRS"

          LFTP_SCRIPT="$(mktemp)"
          {
            printf '%s\n' 'set ftp:ssl-force true'
            printf '%s\n' 'set ftp:ssl-protect-data true'
            printf '%s\n' 'set ftp:use-tvfs yes'
            printf '%s\n' 'set ssl:verify-certificate yes'
            printf '%s\n' 'set ssl:check-hostname no'
            printf '%s\n' 'set net:max-retries 5'
            printf '%s\n' 'set net:timeout 60'
            printf '%s\n' 'set cmd:fail-exit yes'
            printf '%s\n' 'set xfer:clobber on'
            printf 'cd "%s"\n' "$CPANEL_APP_DIR"
            printf '%s\n' 'put app.cjs -o app.cjs'
            printf '%s\n' 'put package.json -o package.json'
            printf '%s\n' 'put bun.lock -o bun.lock'

            printf '%s\n' 'set cmd:fail-exit no'
            printf '%s\n' 'rm -r .output-cpanel-next'
            printf '%s\n' 'rm -r .output-cpanel-prev'
            printf '%s\n' 'set cmd:fail-exit yes'
            printf '%s\n' 'mirror -R --delete --ignore-time --parallel=1 --verbose .output-cpanel .output-cpanel-next'
            printf 'put .output-cpanel/server/index.mjs -o .output-cpanel-next/server/index.mjs\n'
            printf 'put .output-cpanel/server/_runtime.mjs -o .output-cpanel-next/server/_runtime.mjs\n'
            printf 'put .output-cpanel/server/_ssr/%s -o .output-cpanel-next/server/_ssr/%s\n' "$SSR_SERVER_FILE" "$SSR_SERVER_FILE"
            printf 'put .output-cpanel/server/%s -o .output-cpanel-next/server/%s\n' "$TANSTACK_MANIFEST_FILE" "$TANSTACK_MANIFEST_FILE"
            printf 'cls .output-cpanel-next/server/index.mjs\n'
            printf 'cls .output-cpanel-next/server/_runtime.mjs\n'
            printf 'cls .output-cpanel-next/server/_ssr/%s\n' "$SSR_SERVER_FILE"
            printf 'cls .output-cpanel-next/server/%s\n' "$TANSTACK_MANIFEST_FILE"

            printf '%s\n' 'set cmd:fail-exit no'
            printf '%s\n' 'mv .output-cpanel .output-cpanel-prev'
            printf '%s\n' 'set cmd:fail-exit yes'
            printf '%s\n' 'mv .output-cpanel-next .output-cpanel'

            printf '%s\n' 'set cmd:fail-exit no'
            printf '%s\n' 'cd tmp'
            printf '%s\n' 'set cmd:fail-exit yes'
            printf '%s\n' 'put restart.txt -o restart.txt'

            printf 'cd "%s"\n' "$CPANEL_WEBROOT_DIR"
            printf '%s\n' 'put deploy/cpanel/yhp-production.htaccess -o .htaccess'

            for dir in $PUBLIC_DIRS; do
              printf '%s\n' 'set cmd:fail-exit no'
              printf 'rm -r %s-next\n' "$dir"
              printf 'rm -r %s-prev\n' "$dir"
              printf '%s\n' 'set cmd:fail-exit yes'
              printf 'mirror -R --delete --ignore-time --parallel=1 --verbose .output-cpanel/public/%s %s-next\n' "$dir" "$dir"
              printf '%s\n' 'set cmd:fail-exit no'
              printf 'mv %s %s-prev\n' "$dir" "$dir"
              printf '%s\n' 'set cmd:fail-exit yes'
              printf 'mv %s-next %s\n' "$dir" "$dir"
            done
          } > "$LFTP_SCRIPT"

          lftp -u "$CPANEL_PRODUCTION_FTP_USERNAME","$CPANEL_PRODUCTION_FTP_PASSWORD" "ftp://$CPANEL_PRODUCTION_FTPS_HOST:21" < "$LFTP_SCRIPT"

      - name: Verify uploaded production files
        env:
          CPANEL_PRODUCTION_FTPS_HOST: ${{ secrets.CPANEL_FTP_HOST }}
          CPANEL_PRODUCTION_FTP_USERNAME: suwanee1155
          CPANEL_PRODUCTION_FTP_PASSWORD: ${{ secrets.CPANEL_FTP_PASSWORD }}
          SSR_SERVER_FILE: ${{ env.SSR_SERVER_FILE }}
          TANSTACK_MANIFEST_FILE: ${{ env.TANSTACK_MANIFEST_FILE }}
          PUBLIC_CSS_FILE: ${{ env.PUBLIC_CSS_FILE }}
          PUBLIC_JS_FILE: ${{ env.PUBLIC_JS_FILE }}
        run: |
          test -n "$CPANEL_PRODUCTION_FTPS_HOST"
          test -n "$CPANEL_PRODUCTION_FTP_USERNAME"
          test -n "$CPANEL_PRODUCTION_FTP_PASSWORD"
          test -n "$SSR_SERVER_FILE"
          test -n "$TANSTACK_MANIFEST_FILE"
          test -n "$PUBLIC_CSS_FILE"
          test -n "$PUBLIC_JS_FILE"
          PUBLIC_DIRS="$(find .output-cpanel/public -mindepth 1 -maxdepth 1 -type d -printf '%f\n' | sort)"
          test -n "$PUBLIC_DIRS"

          LFTP_VERIFY_SCRIPT="$(mktemp)"
          {
            printf '%s\n' 'set ftp:ssl-force true'
            printf '%s\n' 'set ftp:ssl-protect-data true'
            printf '%s\n' 'set ftp:use-tvfs yes'
            printf '%s\n' 'set ssl:verify-certificate yes'
            printf '%s\n' 'set ssl:check-hostname no'
            printf '%s\n' 'set net:max-retries 5'
            printf '%s\n' 'set net:timeout 60'
            printf '%s\n' 'set cmd:fail-exit yes'
            printf 'cd "%s"\n' "$CPANEL_APP_DIR"
            printf '%s\n' 'cls -1 .env'
            printf '%s\n' 'cls -1 app.cjs'
            printf '%s\n' 'cls -1 package.json'
            printf '%s\n' 'cls -1 bun.lock'
            printf '%s\n' 'cd .output-cpanel'
            printf '%s\n' 'cd server'
            printf '%s\n' 'cls -1 index.mjs'
            printf 'cls -1 _ssr/%s\n' "$SSR_SERVER_FILE"
            printf 'cls -1 %s\n' "$TANSTACK_MANIFEST_FILE"
            printf '%s\n' 'cd ..'
            printf '%s\n' 'cd public'
            printf '%s\n' 'cls -1'
            printf '%s\n' 'cd ..'
            printf 'cd "%s"\n' "$CPANEL_WEBROOT_DIR"
            printf '%s\n' 'cls -1 .htaccess'
            printf 'cd assets\n'
            printf 'cls -1 %s\n' "$PUBLIC_CSS_FILE"
            printf 'cls -1 %s\n' "$PUBLIC_JS_FILE"
            printf '%s\n' 'cd ..'
            printf '%s\n' 'cd brand'
            printf '%s\n' 'cls -1 yhp-favicon.png'
            printf '%s\n' 'cd ..'
            for dir in $PUBLIC_DIRS; do
              printf 'cd %s\n' "$dir"
              printf '%s\n' 'cls -1'
              printf '%s\n' 'cd ..'
            done
          } > "$LFTP_VERIFY_SCRIPT"

          lftp -u "$CPANEL_PRODUCTION_FTP_USERNAME","$CPANEL_PRODUCTION_FTP_PASSWORD" "ftp://$CPANEL_PRODUCTION_FTPS_HOST:21" < "$LFTP_VERIFY_SCRIPT"

      - name: Verify production deployment
        run: |
          for attempt in {1..36}; do
            if curl --fail --silent --show-error --location https://yorubaheritageworld.com/ > /dev/null \
              && curl --fail --silent --show-error --location https://yorubaheritageworld.com/about > /dev/null \
              && curl --fail --silent --show-error --location --head https://yorubaheritageworld.com/brand/yhp-favicon.png > /dev/null \
              && curl --fail --silent --show-error --location https://www.yorubaheritageworld.com/ > /dev/null; then
              exit 0
            fi

            sleep 10
          done

          curl --fail --show-error --location https://yorubaheritageworld.com/

      - name: Write GitHub deployment summary
        if: always()
        run: |
          {
            echo "## Production deployment"
            echo ""
            echo "- Workflow: $GITHUB_WORKFLOW"
            echo "- Branch: $GITHUB_REF_NAME"
            echo "- Commit: $GITHUB_SHA"
            echo "- Application directory: $CPANEL_APP_DIR"
            echo "- Webroot: $CPANEL_WEBROOT_DIR"
            echo "- Production URL: https://yorubaheritageworld.com"
            echo "- WWW URL: https://www.yorubaheritageworld.com"
          } >> "$GITHUB_STEP_SUMMARY"
