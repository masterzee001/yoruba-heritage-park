name: Deploy cPanel Preview

on:
  workflow_dispatch:
  push:
    branches:
      - development

concurrency:
  group: cpanel-preview
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build and deploy preview
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      CPANEL_APP_DIR: /repositories/yoruba-heritage-park
      CPANEL_WEBROOT_DIR: /public_html/yhp-preview.deedoc.org

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build cPanel output
        run: bun run build:cpanel

      - name: Install FTP client
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Validate deployment secrets
        env:
          CPANEL_FTP_HOST: ${{ secrets.CPANEL_FTP_HOST }}
          CPANEL_FTP_USERNAME: ${{ secrets.CPANEL_FTP_USERNAME }}
          CPANEL_FTP_PASSWORD: ${{ secrets.CPANEL_FTP_PASSWORD }}
        run: |
          test -n "$CPANEL_FTP_HOST"
          test -n "$CPANEL_FTP_USERNAME"
          test -n "$CPANEL_FTP_PASSWORD"

      - name: Prepare restart marker
        run: |
          date -u +"%Y-%m-%dT%H:%M:%SZ" > restart.txt
          echo "SSR_SERVER_FILE=$(basename .output-cpanel/server/_ssr/server-*.mjs)" >> "$GITHUB_ENV"
          echo "TANSTACK_MANIFEST_FILE=$(basename .output-cpanel/server/_tanstack-start-manifest_v-*.mjs)" >> "$GITHUB_ENV"

      - name: Upload build to cPanel
        env:
          CPANEL_FTP_HOST: ${{ secrets.CPANEL_FTP_HOST }}
          CPANEL_FTP_USERNAME: ${{ secrets.CPANEL_FTP_USERNAME }}
          CPANEL_FTP_PASSWORD: ${{ secrets.CPANEL_FTP_PASSWORD }}
          SSR_SERVER_FILE: ${{ env.SSR_SERVER_FILE }}
          TANSTACK_MANIFEST_FILE: ${{ env.TANSTACK_MANIFEST_FILE }}
        run: |
          lftp -u "$CPANEL_FTP_USERNAME","$CPANEL_FTP_PASSWORD" "$CPANEL_FTP_HOST" <<EOF
          set ftp:ssl-allow no
          set net:max-retries 5
          set net:timeout 60
          set cmd:fail-exit yes
          set xfer:clobber on

          mkdir -p "$CPANEL_APP_DIR"
          cd "$CPANEL_APP_DIR"
          put app.cjs -o app.cjs
          put package.json -o package.json
          put bun.lock -o bun.lock

          set cmd:fail-exit no
          rm -r .output-cpanel-next
          rm -r .output-cpanel-prev
          set cmd:fail-exit yes

          mirror -R --delete --ignore-time --parallel=1 --verbose .output-cpanel .output-cpanel-next
          put .output-cpanel/server/index.mjs -o .output-cpanel-next/server/index.mjs
          put .output-cpanel/server/_runtime.mjs -o .output-cpanel-next/server/_runtime.mjs
          put .output-cpanel/server/_ssr/$SSR_SERVER_FILE -o .output-cpanel-next/server/_ssr/$SSR_SERVER_FILE
          put .output-cpanel/server/$TANSTACK_MANIFEST_FILE -o .output-cpanel-next/server/$TANSTACK_MANIFEST_FILE
          cls .output-cpanel-next/server/index.mjs
          cls .output-cpanel-next/server/_runtime.mjs
          cls .output-cpanel-next/server/_ssr/$SSR_SERVER_FILE
          cls .output-cpanel-next/server/$TANSTACK_MANIFEST_FILE

          set cmd:fail-exit no
          mv .output-cpanel .output-cpanel-prev
          set cmd:fail-exit yes
          mv .output-cpanel-next .output-cpanel

          mkdir -p tmp

          mkdir -p "$CPANEL_WEBROOT_DIR"
          cd "$CPANEL_WEBROOT_DIR"
          put deploy/cpanel/yhp-preview.htaccess -o .htaccess

          set cmd:fail-exit no
          rm -r assets-next
          rm -r brand-next
          rm -r reference-next
          rm -r assets-prev
          rm -r brand-prev
          rm -r reference-prev
          set cmd:fail-exit yes

          mirror -R --delete --ignore-time --parallel=1 --verbose .output-cpanel/public/assets assets-next
          mirror -R --delete --ignore-time --parallel=1 --verbose .output-cpanel/public/brand brand-next
          mirror -R --delete --ignore-time --parallel=1 --verbose .output-cpanel/public/reference reference-next
          cls assets-next/styles-*.css
          cls assets-next/index-*.js
          cls brand-next/yhp-favicon.png

          set cmd:fail-exit no
          mv assets assets-prev
          mv brand brand-prev
          mv reference reference-prev
          set cmd:fail-exit yes
          mv assets-next assets
          mv brand-next brand
          mv reference-next reference

          cd "$CPANEL_APP_DIR"
          put restart.txt -o tmp/restart.txt
          EOF

      - name: Verify preview deployment
        run: |
          for attempt in {1..12}; do
            if curl --fail --silent --show-error --location https://yhp-preview.deedoc.org/ > /dev/null \
              && curl --fail --silent --show-error --location https://yhp-preview.deedoc.org/about > /dev/null \
              && curl --fail --silent --show-error --location https://yhp-preview.deedoc.org/assets/styles-B0x9wfbX.css > /dev/null; then
              exit 0
            fi

            sleep 10
          done

          curl --fail --show-error --location https://yhp-preview.deedoc.org/
